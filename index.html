<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameForge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .logo span { color: #f97316; }

    .api-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      padding: 6px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      transition: border-color 0.2s;
    }

    .api-badge:hover { border-color: #555; }
    .api-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: #555; }
    .api-badge .dot.active { background: #22c55e; }

    /* API Key Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 420px;
      max-width: 90vw;
    }

    .modal h2 { font-size: 18px; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.6; }

    .modal input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e8e8e8;
      font-size: 14px;
      font-family: monospace;
      outline: none;
      margin-bottom: 12px;
    }

    .modal input:focus { border-color: #f97316; }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .btn-primary { background: #f97316; color: #fff; }
    .btn-ghost { background: #2a2a2a; color: #e8e8e8; }

    /* Main */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    .hero p { font-size: 16px; color: #888; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed #2a2a2a;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 32px;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #f97316;
      background: rgba(249, 115, 22, 0.04);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .upload-zone h3 { font-size: 16px; margin-bottom: 6px; }
    .upload-zone p { font-size: 13px; color: #666; }

    /* Preview grid */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #222;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: none;
      color: #fff;
      font-size: 12px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .generate-btn {
      width: 100%;
      padding: 16px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 40px;
    }

    .generate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Results */
    .results { display: flex; flex-direction: column; gap: 24px; }

    .result-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
    }

    .result-header {
      display: flex;
      gap: 16px;
      padding: 20px;
      border-bottom: 1px solid #222;
      align-items: flex-start;
    }

    .result-thumb {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .result-meta { flex: 1; }

    .result-meta .scene-label {
      font-size: 11px;
      color: #f97316;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .result-meta .scene-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .result-meta .hook-event {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
    }

    .result-body { padding: 20px; }

    .prompt-label {
      font-size: 11px;
      color: #666;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .prompt-text {
      font-size: 14px;
      line-height: 1.7;
      color: #ccc;
      background: #0f0f0f;
      border-radius: 10px;
      padding: 16px;
      white-space: pre-wrap;
    }

    .copy-btn {
      margin-top: 12px;
      background: #2a2a2a;
      color: #e8e8e8;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px;
      color: #888;
      font-size: 14px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      padding: 20px;
      color: #f87171;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Frame<span>Forge</span></div>
    <div class="api-badge" id="apiBadge">
      <div class="dot" id="apiDot"></div>
      <span id="apiLabel">API 키 설정</span>
    </div>
  </header>

  <!-- API Key Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Gemini API 키 입력</h2>
      <p>Google AI Studio에서 발급받은 API 키를 입력하세요.<br>키는 브라우저에만 저장되며 외부로 전송되지 않습니다.</p>
      <input type="password" id="apiKeyInput" placeholder="AIza..." />
      <div class="modal-actions">
        <button class="btn-ghost" id="modalCancel">취소</button>
        <button class="btn-primary" id="modalSave">저장</button>
      </div>
    </div>
  </div>

  <main>
    <div class="hero">
      <h1>이미지 → 영상 프롬프트</h1>
      <p>이미지를 업로드하면 AI가 핵심 후킹 이벤트를 분석하고<br>영상 제작용 프롬프트를 생성합니다.</p>
    </div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" multiple />
      <div class="upload-icon">🖼️</div>
      <h3>이미지를 드래그하거나 클릭해서 업로드</h3>
      <p>JPG, PNG, WEBP · 여러 장 동시 업로드 가능</p>
    </div>

    <div class="preview-grid" id="previewGrid"></div>

    <button class="generate-btn" id="generateBtn" disabled>
      프롬프트 생성하기
    </button>

    <div class="results" id="results"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
